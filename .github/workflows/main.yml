on:
  push:

jobs:
  test:
    continue-on-error: true
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Test
        run: make
  test-windows:
    continue-on-error: true
    strategy:
      fail-fast: false
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Test with debug
        run: make -d SHELL='C:/Program Files/Git/bin/sh.exe' test
