on:
  push:

jobs:
  test:
    continue-on-error: true
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Test
        run: make
  test-windows:
    continue-on-error: true
    strategy:
      fail-fast: false
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Test
        run: make -i
      - name: Test with shell
        run: make -i SHELL='C:/Program Files/Git/bin/sh.exe'
      - name: Test in subdir
        run: make -i -C sub
      - name: Test with shell in subdir
        run: make -i SHELL='C:/Program Files/Git/bin/sh.exe' -C sub
