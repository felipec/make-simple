on:
  push:

jobs:
  test-windows:
    continue-on-error: true
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: make create-process
      - name: Test
        run: make -i test-create-process
      - name: Run directly
        run: |
          Start-Process -FilePath 'bash' -ArgumentList '--version' -Wait -NoNewWindow -PassThru
      - name: Run create-process-b
        run: |
          & bash --version 2>&1
      - name: Run create-process-a
        run: ./create-process.exe 'bash --version' 2>&1
      - name: Run create-process
        run: |
          & ./create-process.exe 'bash --version' 2>&1
