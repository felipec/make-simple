on:
  push:

jobs:
  test:
    continue-on-error: true
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Test
        run: make
  test-windows:
    continue-on-error: true
    strategy:
      fail-fast: false
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Test foo
        run: make -d -i test-foo
      - name: Test bar
        run: make -d -i test-bar
      - name: Test bar with bash
        run: make -d -i test-bar-bash
      - name: Test bar with sh.exe
        shell: bash
        run: "\"C:/Program Files/Git/bin/sh.exe\" -c \"bash sub/bar.t\""
