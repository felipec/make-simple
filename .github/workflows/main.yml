on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: make -i
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Print PATH
        run: |
          $Env:Path
          $Env:SHELL
      - name: Print PATH bash
        shell: bash
        run: |
          echo $PATH
          echo $SHELL
      - name: Test
        shell: bash
        run: make -i SHELL='C:/Program Files/Git/bin/sh.exe'
