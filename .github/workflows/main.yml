on:
  push:

jobs:
  test-windows:
    continue-on-error: true
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: make create-process
      - name: Run foo.t
        run: ./create-process.exe './foo.t' 2>&1
      - name: Run create-process-a 1
        run: ./create-process.exe 'bash --version' 2>&1
      - name: Run create-process-a 4
        run: |
          ./create-process.exe '"C:/Windows/System32/bash.exe" --version' 2>&1
      - name: Fix shell
        run: |
          ./create-process.exe '"C:/Program Files/Git/bin/sh.exe" -c "bash --version"' 2>&1
