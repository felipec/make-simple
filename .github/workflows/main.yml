on:
  push:

jobs:
  test:
    continue-on-error: true
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Test
        run: make
  test-windows:
    continue-on-error: true
    strategy:
      fail-fast: false
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Test direct
        run: bash sub/foo.t
      - name: Test with pwsh
        run: |
          Start-Process -FilePath "bash" -ArgumentList "sub/foo.t"
      - name: Test with pwsh and sh.exe
        run: |
          Start-Process -FilePath "C:/Program Files/Git/bin/sh.exe" -ArgumentList "-c","sub/foo.t"
      - name: Test with make
        run: make -d -i SHELL='C:/Program Files/Git/bin/sh.exe' test-foo
