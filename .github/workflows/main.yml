on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: make -i
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Print sh.exe location
        run: Get-Command sh.exe
      - name: Print sh location
        run: Get-Command sh
      - name: Test
        run: |
          $env:Path = 'C:\mingw64\bin'
          make -i
