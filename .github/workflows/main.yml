on:
  push:

jobs:
  test:
    continue-on-error: true
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Test
        run: make
  test-windows:
    continue-on-error: true
    strategy:
      fail-fast: false
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Test with debug (good)
        run: make -d SHELL='C:/Program Files/Git/bin/sh' test
      - name: Test with debug (bad)
        run: make -d SHELL='C:/Program Files/Git/bin/sh.exe' test
      - name: Test directly
        run: sub/foo.t
      - name: Test directly with bash
        shell: bash
        run: sub/foo.t
