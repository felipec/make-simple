on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: make -i
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Print SHELL
        run: $Env:SHELL
      - name: Print COMSPEC
        run: $Env:COMSPEC
      - name: Print SHELL bash
        shell: bash
        run: echo $SHELL
      - name: Test
        shell: bash
        run: make -i
