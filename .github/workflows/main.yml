on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: make -i
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set PATH
        run: $env:Path = ''
      - name: Print PATH
        run: $Env:Path
      - name: Print SHELL bash
        shell: bash
        run: echo $SHELL
      - name: Test
        shell: bash
        run: make -i
