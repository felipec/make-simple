on:
  push:

jobs:
  test-windows:
    continue-on-error: true
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: make create-process
      - name: Test
        run: make -i test
      - name: Test
        run: make -i test-create-process
      - name: Run directly
        run: |
          $env:Path = 'C:/Windows/System32;' + $env:Path
          Start-Process -FilePath 'bash' -ArgumentList '--version' -Wait -NoNewWindow
      - name: Run directly 2
        run: |
          $env:Path = 'C:/Windows/System32;' + $env:Path
          bash --version
      - name: Run foo.t
        run: ./create-process.exe './foo.t' 2>&1
      - name: Run create-process-a 1
        run: ./create-process.exe 'bash --version' 2>&1
      - name: Run create-process-a 4
        run: |
          ./create-process.exe '"C:/Windows/System32/bash.exe" --version' 2>&1
      - name: Fix shell
        run: |
          ./create-process.exe '"C:/Program Files/Git/bin/sh.exe" -c "bash --version"' 2>&1
