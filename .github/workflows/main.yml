on:
  push:

jobs:
  test-windows:
    continue-on-error: true
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fix WSL nonsense
        run: Remove-Item -Path 'C:/Windows/System32/bash.exe'  -Force
      - name: Build
        run: make create-process
      - name: Check system bash
        run: Test-Path 'C:/Windows/System32/sh.exe' -PathType Leaf
      - name: Test
        run: make -i test
      - name: Test
        run: make -i test-create-process
      - name: Run directly
        run: |
          Start-Process -FilePath 'bash' -ArgumentList '--version' -Wait -NoNewWindow
      - name: Run directly 2
        run: |
          Start-Process -FilePath 'bash.exe' -ArgumentList '--version' -Wait -NoNewWindow
      - name: Run create-process-b
        run: |
          & 'bash' --version 2>&1
      - name: Run create-process-b 2
        run: |
          & 'bash.exe' --version 2>&1
      - name: Run create-process-a 1
        run: ./create-process.exe 'bash --version' 2>&1
      - name: Run create-process-a 2
        run: ./create-process.exe 'bash.exe --version' 2>&1
      - name: Run create-process-a 3
        run: |
          ./create-process.exe '"C:/Program Files/Git/bin/bash.exe" --version' 2>&1
      - name: Run create-process-a 4
        run: |
          ./create-process.exe '"C:/Windows/System32/bash.exe" --version' 2>&1
