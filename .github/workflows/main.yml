on:
  push:

jobs:
  test:
    continue-on-error: true
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Test
        run: make
  test-windows:
    continue-on-error: true
    strategy:
      fail-fast: false
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Print environment variables
        run: |
          Get-Variable
          Get-Item Env:PATH
          $env:path.Split(";")
          Get-ChildItem Env:
      - name: Test direct
        run: bash sub/foo.t
      - name: Test with pwsh
        run: |
          Start-Process -FilePath "bash" -Wait -NoNewWindow -ArgumentList "sub/foo.t"
      - name: Test with pwsh and no path
        run: |
          $env:Path = ''
          Start-Process -FilePath "bash" -Wait -NoNewWindow -ArgumentList "sub/foo.t"
      - name: Test with pwsh and new environment
        run: |
          Start-Process -FilePath "bash" -Wait -NoNewWindow -UseNewEnvironment -ArgumentList "sub/foo.t"
      - name: Test with pwsh and sh.exe
        run: |
          Start-Process -FilePath "C:/Program Files/Git/bin/sh.exe" -Wait -NoNewWindow -ArgumentList "-c","sub/foo.t"
      - name: Test with make and sh
        run: make -d -i SHELL='C:/Program Files/Git/bin/sh' test-foo
      - name: Test with make and sh.exe
        run: make -d -i SHELL='C:/Program Files/Git/bin/sh.exe' test-foo
