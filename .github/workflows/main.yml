on:
  push:

jobs:
  test:
    continue-on-error: true
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Test
        run: make
  test-windows:
    continue-on-error: true
    strategy:
      fail-fast: false
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Test with bash
        shell: bash
        run: "'C:/Program Files/Git/usr/bin/bash' sub/foo.t || true"
      - name: Test with sh.exe
        shell: bash
        run: "'C:/Program Files/Git/bin/sh.exe' sub/foo.t || true"
      - name: Test with sh.exe -c
        shell: bash
        run: "'C:/Program Files/Git/bin/sh.exe' -c 'sub/foo.t' || true"
      - name: Test with sh
        shell: bash
        run: "'C:/Program Files/Git/bin/sh' sub/foo.t || true"
      - name: Test with bash.exe
        run: "'C:/Program Files/Git/usr/bin/bash.exe' sub/foo.t || true"
